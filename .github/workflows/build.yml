name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Wersje
        run: |
          flutter --version
          java -version

      # flutter create nadpisuje pubspec.yaml i lib/main.dart,
      # wiec chowamy pliki projektu przed wygenerowaniem rusztowania.
      - name: Zabezpiecz pliki projektu
        run: |
          mkdir -p /tmp/keep
          cp pubspec.yaml /tmp/keep/pubspec.yaml
          cp -r lib /tmp/keep/lib
          cp analysis_options.yaml /tmp/keep/ 2>/dev/null || true

      - name: Generuj rusztowanie Android
        run: |
          flutter create --org pl.atlas --project-name atlas_grzybow \
                         --platforms=android --overwrite .

      - name: Przywroc pliki projektu
        run: |
          rm -rf lib
          cp -r /tmp/keep/lib lib
          cp /tmp/keep/pubspec.yaml pubspec.yaml
          cp /tmp/keep/analysis_options.yaml . 2>/dev/null || true
          # flutter create generuje test/widget_test.dart odwolujacy sie
          # do klasy MyApp, ktorej u nas nie ma. Nie wchodzi do APK.
          rm -rf test

      - name: Podnies minSdk (wymagane przez sqflite)
        run: |
          GRADLE=android/app/build.gradle.kts
          if [ -f "$GRADLE" ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' $GRADLE
          else
            GRADLE=android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' $GRADLE
          fi
          grep -n "minSdk" $GRADLE || true

      - name: Nazwa aplikacji i uprawnienie INTERNET
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="atlas_grzybow"/android:label="Atlas grzybow"/' $MANIFEST
          if ! grep -q 'permission.INTERNET' $MANIFEST; then
            sed -i '0,/<manifest[^>]*>/s//&\n    <uses-permission android:name="android.permission.INTERNET"\/>/' $MANIFEST
          fi
          echo "--- manifest ---"
          cat $MANIFEST

      - name: Generuj ikone aplikacji
        run: |
          pip install --quiet pillow
          python3 tools/make_icon.py android/app/src/main/res
          # flutter create tworzy domyslne launcher_icon w mipmap-* -
          # nasze pliki je nadpisaly, ale usuwamy tez ewentualne XML-e
          # z drawable, ktore moglyby przeslonic ikone adaptacyjna.
          rm -f android/app/src/main/res/drawable*/ic_launcher*.xml || true
          ls -R android/app/src/main/res/mipmap-xxxhdpi/

      - name: Generuj baze SQLite
        run: |
          mkdir -p assets/db
          python3 tools/build_db.py assets/db/atlas.db
          ls -la assets/db/

      - name: Zaleznosci
        run: flutter pub get

      - name: Analiza statyczna
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK (tylko arm64-v8a)
        run: flutter build apk --release --target-platform android-arm64

      - name: Zmien nazwe na czytelna
        run: |
          cd build/app/outputs/flutter-apk
          WERSJA=$(grep '^version:' ../../../../pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          mv app-release.apk "atlas-grzybow-${WERSJA}-arm64.apk"
          ls -lah

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: atlas-grzybow-apk
          path: build/app/outputs/flutter-apk/atlas-grzybow-*.apk
          retention-days: 60
          if-no-files-found: error

      - name: Release przy tagu
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/atlas-grzybow-*.apk
          generate_release_notes: true
